name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  # Step 1: Create the GitHub release once (not 3x in parallel)
  create-release:
    runs-on: ubuntu-latest
    outputs:
      release_id: ${{ steps.create-release.outputs.id }}
    steps:
      - uses: actions/checkout@v4

      - name: Create GitHub Release
        id: create-release
        uses: softprops/action-gh-release@v2
        with:
          name: 'Compress I/O ${{ github.ref_name }}'
          draft: false
          prerelease: false
          body: |
            ## 📦 Compress I/O ${{ github.ref_name }}

            High-performance media compression for images and videos — powered by FFmpeg, built with Tauri.

            ---

            ### 🖥️ Download for your OS

            | Platform | File | Notes |
            |----------|------|-------|
            | **Windows** | `.msi` installer | Recommended for most users |
            | **macOS** | `.dmg` disk image | Apple Silicon (M-series) |
            | **Linux** | `.AppImage` | Universal, no install needed |
            | **Linux** | `.deb` | For Debian/Ubuntu |

            > ⚠️ **macOS users**: If blocked by Gatekeeper, right-click the `.dmg` → Open.
            >
            > ⚠️ **Linux AppImage**: Run `chmod +x Compress*.AppImage` before launching.

            ---

            Built with ❤️ using Tauri v2 + React.

  # Step 2: Build for each platform and upload to the release created above
  build:
    needs: create-release
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            args: '--features cpu'
          - platform: macos-15
            args: '--features cpu'
          - platform: ubuntu-22.04
            args: '--features cpu'

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies (Ubuntu only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      # ── FFmpeg Auto-Download ──────────────────────────────────────────────

      - name: Download FFmpeg (Linux)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          mkdir -p src-tauri/binaries
          wget -q https://johnvansickle.com/ffmpeg/releases/ffmpeg-release-amd64-static.tar.xz
          tar -xf ffmpeg-release-amd64-static.tar.xz
          find . -name "ffmpeg" -type f -not -path "./src-tauri/*" -exec mv {} src-tauri/binaries/ffmpeg-x86_64-unknown-linux-gnu \;
          chmod +x src-tauri/binaries/ffmpeg-x86_64-unknown-linux-gnu

      - name: Download FFmpeg (macOS)
        if: matrix.platform == 'macos-15'
        run: |
          mkdir -p src-tauri/binaries
          curl -L -o ffmpeg.zip https://www.osxexperts.net/ffmpeg7arm.zip
          unzip -o ffmpeg.zip
          find . -name "ffmpeg" -type f -not -path "./src-tauri/*" -exec mv {} src-tauri/binaries/ffmpeg-aarch64-apple-darwin \;
          chmod +x src-tauri/binaries/ffmpeg-aarch64-apple-darwin

      - name: Download FFmpeg (Windows)
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path src-tauri/binaries | Out-Null
          curl.exe -L -o ffmpeg.zip https://www.gyan.dev/ffmpeg/builds/ffmpeg-release-essentials.zip
          7z x ffmpeg.zip -y | Out-Null
          $ffmpeg = Get-ChildItem -Recurse -Filter ffmpeg.exe | Where-Object { $_.FullName -notlike "*src-tauri*" } | Select-Object -First 1
          Move-Item -Path $ffmpeg.FullName -Destination src-tauri/binaries/ffmpeg-x86_64-pc-windows-msvc.exe

      # ─────────────────────────────────────────────────────────────────────

      - name: Install frontend dependencies
        run: npm install

      - name: Build and upload to release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          releaseId: ${{ needs.create-release.outputs.release_id }}
          args: ${{ matrix.args }}